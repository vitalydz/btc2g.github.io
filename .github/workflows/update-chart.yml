name: Update BTC vs Gold Chart

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  update-chart:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Generate chart
        run: python scripts/update_btc_gold_chart.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/btc_gold_forecast.png assets/btc_gold_forecast_meta.json
          if git diff --staged --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "Update BTC vs Gold forecast chart"
            git push
          fi
