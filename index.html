<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BTC2G - Bitcoin vs Gold Forecast</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      text-align: center;
      background: linear-gradient(to bottom right, #1e1e1e, #2c2c2c);
      margin: 0;
      padding: 20px;
      color: #ffffff;
    }

    .container {
      max-width: 960px;
      margin: auto;
      padding: 20px;
      background: #222;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    h1, p#subtitle {
      text-align: center;
      margin: 0 0 10px 0;
    }

    p#subtitle {
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #444;
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .chart-error {
      display: none;
      margin: -6px 0 18px;
      color: #ffb4b4;
      font-weight: bold;
    }

    .lang-switch {
      margin-top: 20px;
    }

    .lang-switch button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #3a3a3a;
      color: white;
      cursor: pointer;
      font-weight: bold;
      min-width: 80px;
    }

    .lang-switch button:hover {
      background: #555;
    }

    .moonpay-btn,
    .topper-btn {
      display: inline-block;
      margin-top: 25px;
      margin-left: 6px;
      margin-right: 6px;
      padding: 12px 24px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .moonpay-btn {
      background-color: #3c67e3;
    }

    .moonpay-btn:hover {
      background-color: #2a4fcc;
    }

    .topper-btn {
      background-color: #0f8f68;
    }

    .topper-btn:hover {
      background-color: #0b7556;
    }

    .update-btn {
      display: inline-flex;
      align-items: center;
      border: none;
      margin-top: 20px;
      margin-bottom: 20px;
      padding: 12px 24px;
      background-color: #4caf50;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .update-btn:hover {
      background-color: #43a047;
      transform: scale(1.04);
    }

    .update-btn svg {
      vertical-align: middle;
      margin-right: 8px;
      fill: white;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #aaa;
    }

    footer a {
      color: #87cefa;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">Bitcoin vs Gold Forecast</h1>
    <p id="subtitle">From 2016 to <span id="current-date"></span>, with projection to 2030</p>

    <img
      id="forecastChart"
      src="assets/btc_gold_forecast.png"
      alt="BTC vs Gold Forecast"
    />
    <p id="chart-error" class="chart-error">The BTC vs Gold Forecast chart is unavailable right now. Please try refreshing it.</p>

    <button class="update-btn" id="refresh-chart-btn" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
        <path d="M12 4V1L8 5l4 4V6c3.3 0 6 2.7 6 6a6.002 6.002 0 0 1-5.125 5.938 1 1 0 1 0 .25 1.984A8.002 8.002 0 0 0 20 12c0-4.4-3.6-8-8-8z"/>
        <path d="M12 20v3l4-4-4-4v3c-3.3 0-6-2.7-6-6a6.002 6.002 0 0 1 5.125-5.938 1 1 0 1 0-.25-1.984A8.002 8.002 0 0 0 4 12c0 4.4 3.6 8 8 8z"/>
      </svg>
      <span id="refresh-chart-text">Update chart manually</span>
    </button>

    <div class="lang-switch">
      <button onclick="setLang('en')">English</button>
      <button onclick="setLang('ru')">Русский</button>
      <button onclick="setLang('he')">עברית</button>
      <button onclick="setLang('de')">Deutsch</button>
      <button onclick="setLang('fr')">Français</button>
      <button onclick="setLang('es')">Español</button>
      <button onclick="setLang('zh')">中文</button>
    </div>

    <a
      class="moonpay-btn"
      href="https://buy.moonpay.com"
      target="_blank"
      id="moonpay-text"
      rel="noopener noreferrer"
    >
      Buy Bitcoin via MoonPay 🚀
    </a>

    <a
      class="topper-btn"
      href="buy.html"
      id="topper-text"
    >
      Buy BTC with Topper
    </a>
  </div>

  <footer>
    <p>
      <a href="about.html" id="about-link">About</a> |
      <a href="privacy.html" id="privacy-link">Privacy Policy</a> |
      <a href="terms.html" id="terms-link">Terms of Service</a>
    </p>
    <p>© 2026 BTC2G</p>
  </footer>

  <script>
    const CHART_PATH = 'assets/btc_gold_forecast.png';

    function getUtcDateStamp(date = new Date()) {
      const yyyy = date.getUTCFullYear();
      const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(date.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    const todayStr = getUtcDateStamp();
    document.getElementById('current-date').textContent = todayStr;

    function setChartSrc(version) {
      const chart = document.getElementById('forecastChart');
      const chartError = document.getElementById('chart-error');
      chartError.style.display = 'none';
      chart.style.display = 'block';
      chart.src = `${CHART_PATH}?v=${encodeURIComponent(version)}`;
    }

    function showChartError() {
      document.getElementById('forecastChart').style.display = 'none';
      document.getElementById('chart-error').style.display = 'block';
    }

    document.getElementById('forecastChart').addEventListener('error', showChartError);
    document.getElementById('forecastChart').addEventListener('load', () => {
      document.getElementById('chart-error').style.display = 'none';
      document.getElementById('forecastChart').style.display = 'block';
    });
    document.getElementById('refresh-chart-btn').addEventListener('click', () => {
      setChartSrc(String(Date.now()));
    });
    setChartSrc(todayStr);

    const texts = {
      en: {
        title: 'Bitcoin vs Gold Forecast',
        subtitle: `From 2016 to ${todayStr}, with projection to 2030`,
        chartError: 'The BTC vs Gold Forecast chart is unavailable right now. Please try refreshing it.',
        refreshChart: 'Update chart manually',
        moonpay: 'Buy Bitcoin via MoonPay 🚀',
        topper: 'Buy BTC with Topper',
        about: 'About',
        privacy: 'Privacy Policy',
        terms: 'Terms of Service',
      },
      ru: {
        title: 'Прогноз: Биткоин против золота',
        subtitle: `С 2016 по ${todayStr}, прогноз до 2030 года`,
        chartError: 'График прогноза BTC и золота сейчас недоступен. Попробуйте обновить его.',
        refreshChart: 'Обновить график вручную',
        moonpay: 'Купить Биткоин через MoonPay 🚀',
        topper: 'Купить BTC через Topper',
        about: 'О проекте',
        privacy: 'Политика конфиденциальности',
        terms: 'Условия использования',
      },
      he: {
        title: 'תחזית: ביטקוין מול זהב',
        subtitle: `מ־2016 עד ${todayStr}, תחזית עד 2030`,
        chartError: 'תרשים תחזית BTC מול זהב אינו זמין כרגע. נסה לרענן אותו.',
        refreshChart: 'רענן את התרשים ידנית',
        moonpay: '🚀 MoonPay קנה ביטקוין דרך',
        topper: 'קנה BTC דרך Topper',
        about: 'אודות',
        privacy: 'מדיניות פרטיות',
        terms: 'תנאי שימוש',
      },
      de: {
        title: 'Bitcoin vs Gold Prognose',
        subtitle: `Von 2016 bis ${todayStr}, mit Prognose bis 2030`,
        chartError: 'Das BTC-vs-Gold-Prognosediagramm ist derzeit nicht verfügbar. Bitte aktualisieren Sie es.',
        refreshChart: 'Diagramm manuell aktualisieren',
        moonpay: 'Bitcoin über MoonPay kaufen 🚀',
        topper: 'BTC mit Topper kaufen',
        about: 'Über uns',
        privacy: 'Datenschutz',
        terms: 'Nutzungsbedingungen',
      },
      fr: {
        title: 'Prévision Bitcoin contre Or',
        subtitle: `De 2016 à ${todayStr}, avec projection jusqu’en 2030`,
        chartError: 'Le graphique de prévision BTC contre or est indisponible pour le moment. Essayez de l’actualiser.',
        refreshChart: 'Actualiser le graphique',
        moonpay: 'Acheter du Bitcoin via MoonPay 🚀',
        topper: 'Acheter du BTC avec Topper',
        about: 'À propos',
        privacy: 'Confidentialité',
        terms: 'Conditions d’utilisation',
      },
      es: {
        title: 'Pronóstico Bitcoin vs Oro',
        subtitle: `Desde 2016 hasta ${todayStr}, con proyección hasta 2030`,
        chartError: 'El gráfico de pronóstico BTC vs oro no está disponible ahora. Intenta actualizarlo.',
        refreshChart: 'Actualizar gráfico manualmente',
        moonpay: 'Comprar Bitcoin con MoonPay 🚀',
        topper: 'Comprar BTC con Topper',
        about: 'Acerca de',
        privacy: 'Política de privacidad',
        terms: 'Términos de servicio',
      },
      zh: {
        title: '比特币与黄金走势预测',
        subtitle: `从2016年至${todayStr}，预测至2030年`,
        chartError: 'BTC 与黄金预测图表暂时不可用。请尝试刷新。',
        refreshChart: '手动刷新图表',
        moonpay: '通过 MoonPay 购买比特币 🚀',
        topper: '通过 Topper 购买 BTC',
        about: '关于',
        privacy: '隐私政策',
        terms: '服务条款',
      }
    };

    function setLang(lang) {
      localStorage.setItem('lang', lang);
      const text = texts[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.getElementById('title').textContent = text.title;
      document.getElementById('subtitle').textContent = text.subtitle;
      document.getElementById('chart-error').textContent = text.chartError;
      document.getElementById('refresh-chart-text').textContent = text.refreshChart;
      document.getElementById('moonpay-text').textContent = text.moonpay;
      document.getElementById('topper-text').textContent = text.topper;
      document.getElementById('about-link').textContent = text.about;
      document.getElementById('privacy-link').textContent = text.privacy;
      document.getElementById('terms-link').textContent = text.terms;
    }

    const savedLang = localStorage.getItem('lang');
    const browserLang = navigator.language.slice(0, 2).toLowerCase();
    const supportedLangs = Object.keys(texts);

    if (savedLang && supportedLangs.includes(savedLang)) {
      setLang(savedLang);
    } else if (supportedLangs.includes(browserLang)) {
      setLang(browserLang);
    } else {
      setLang('en');
    }
  </script>
</body>
</html>
