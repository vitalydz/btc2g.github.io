<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buy BTC</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to bottom right, #f1f4f9, #dff1ff);
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }
    .container {
      position: relative;
      max-width: 480px;
      margin: auto;
      background: white;
      border-radius: 12px;
      padding: 64px 30px 30px;
      box-shadow: 0 0 25px rgba(0,0,0,0.1);
    }
    h1 {
      margin-bottom: 16px;
      color: #333;
      font-size: 2em;
    }
    .language-control {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      justify-content: flex-end;
    }
    .language-control select {
      min-height: 32px;
      min-width: 132px;
      box-sizing: border-box;
      padding: 4px 30px 4px 10px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #e0e0e0;
      cursor: pointer;
      font-weight: bold;
      font: inherit;
    }
    .language-control select:hover {
      background: #ccc;
    }
    .buy-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 260px;
      min-height: 48px;
      box-sizing: border-box;
      margin: 8px 0;
      padding: 0 16px;
      font-weight: bold;
      font-size: 0.98em;
      line-height: 1.2;
      color: white;
      background-color: #3c67e3;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s;
      user-select: none;
    }
    .buy-button:hover {
      background-color: #2a4fcc;
    }
    .moonpay-section,
    .topper-section {
      scroll-margin-top: 24px;
    }
    .topper-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #e7e7e7;
      text-align: left;
    }
    .topper-section h2 {
      margin: 0 0 14px;
      color: #333;
      font-size: 1.25em;
      text-align: center;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: bold;
    }
    .field input {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      font: inherit;
    }
    .topper-button {
      background-color: #0f8f68;
    }
    .topper-button:hover {
      background-color: #0b7556;
    }
    .topper-button:disabled {
      background-color: #8ab8a9;
      cursor: wait;
    }
    @media (max-width: 520px) {
      body {
        padding: 16px 12px;
      }
      .container {
        padding: 62px 16px 24px;
      }
      .buy-button {
        max-width: 320px;
      }
    }
    .topper-message {
      min-height: 20px;
      margin: 12px 0 0;
      color: #555;
      font-size: 0.95em;
      text-align: center;
    }
    .topper-message.error {
      color: #b00020;
    }
    .footer-text {
      margin-top: 25px;
      font-size: 0.9em;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">Buy Bitcoin</h1>

    <div class="language-control">
      <select id="language-select" aria-label="Language">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="he">עברית</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="zh">中文</option>
      </select>
    </div>

    <div id="moonpay" class="moonpay-section">
      <button id="buy-btn" class="buy-button">Buy Bitcoin with MoonPay 🚀</button>
    </div>

    <div id="topper" class="topper-section">
      <h2 id="topper-title">Buy Bitcoin with Topper</h2>

      <div class="field">
        <label for="topper-address" id="topper-address-label">BTC wallet address</label>
        <input
          id="topper-address"
          name="topper-address"
          type="text"
          autocomplete="off"
          placeholder="bc1..."
        />
      </div>

      <div class="field">
        <label for="topper-amount" id="topper-amount-label">Amount in USD</label>
        <input
          id="topper-amount"
          name="topper-amount"
          type="number"
          min="1"
          step="0.01"
          value="50.00"
        />
      </div>

      <button id="topper-btn" class="buy-button topper-button">Buy Bitcoin with Topper ✨</button>
      <p id="topper-message" class="topper-message" role="status" aria-live="polite"></p>
    </div>

    <p class="footer-text" id="footer-text">Powered by MoonPay and Topper</p>
  </div>

  <script type="module">
    const TOPPER_API_URL = "https://YOUR-VERCEL-PROJECT.vercel.app/api/topper/token";
    let currentLang = 'en';

    const texts = {
      en: {
        title: 'Buy Bitcoin',
        buyBtn: 'Buy Bitcoin with MoonPay 🚀',
        topperTitle: 'Buy Bitcoin with Topper',
        topperAddressLabel: 'BTC wallet address',
        topperAmountLabel: 'Amount in USD',
        topperBtn: 'Buy Bitcoin with Topper ✨',
        footer: 'Powered by MoonPay and Topper',
        languageLabel: 'Language',
        missingAddress: 'Enter a BTC wallet address before opening Topper.',
        apiNotConfigured: 'Topper API URL is not configured yet. Replace YOUR-VERCEL-PROJECT in buy.html.',
        creatingTopper: 'Creating secure Topper session...',
        topperOpened: 'Topper opened in a new tab.',
        topperMissingToken: 'Topper response was missing token data.',
        topperUnavailable: 'Topper is unavailable right now.',
        moonpayLoading: 'MoonPay is still loading, please wait.',
      },
      ru: {
        title: 'Купить Биткойн',
        buyBtn: 'Купить Биткоин с MoonPay 🚀',
        topperTitle: 'Купить Биткоин с Topper',
        topperAddressLabel: 'BTC-адрес кошелька',
        topperAmountLabel: 'Сумма в USD',
        topperBtn: 'Купить Биткоин с Topper ✨',
        footer: 'При поддержке MoonPay и Topper',
        languageLabel: 'Язык',
        missingAddress: 'Введите BTC-адрес кошелька перед открытием Topper.',
        apiNotConfigured: 'URL Topper API еще не настроен. Замените YOUR-VERCEL-PROJECT в buy.html.',
        creatingTopper: 'Создаем защищенную сессию Topper...',
        topperOpened: 'Topper открыт в новой вкладке.',
        topperMissingToken: 'В ответе Topper нет данных токена.',
        topperUnavailable: 'Topper сейчас недоступен.',
        moonpayLoading: 'MoonPay еще загружается, пожалуйста подождите.',
      },
      he: {
        title: 'קנה ביטקוין',
        buyBtn: 'קנה ביטקוין עם MoonPay 🚀',
        topperTitle: 'קנה ביטקוין עם Topper',
        topperAddressLabel: 'כתובת ארנק BTC',
        topperAmountLabel: 'סכום בדולר',
        topperBtn: 'קנה ביטקוין עם Topper ✨',
        footer: 'בהפעלה של MoonPay ו-Topper',
        languageLabel: 'שפה',
        missingAddress: 'הזן כתובת ארנק BTC לפני פתיחת Topper.',
        apiNotConfigured: 'כתובת Topper API עדיין לא הוגדרה. החלף את YOUR-VERCEL-PROJECT בקובץ buy.html.',
        creatingTopper: 'יוצר חיבור מאובטח ל-Topper...',
        topperOpened: 'Topper נפתח בלשונית חדשה.',
        topperMissingToken: 'בתשובת Topper חסרים נתוני הטוקן.',
        topperUnavailable: 'Topper אינו זמין כרגע.',
        moonpayLoading: 'MoonPay עדיין נטען, אנא המתן.',
      },
      de: {
        title: 'Bitcoin kaufen',
        buyBtn: 'Bitcoin mit MoonPay kaufen 🚀',
        topperTitle: 'Bitcoin mit Topper kaufen',
        topperAddressLabel: 'BTC-Wallet-Adresse',
        topperAmountLabel: 'Betrag in USD',
        topperBtn: 'Bitcoin mit Topper kaufen ✨',
        footer: 'Bereitgestellt von MoonPay und Topper',
        languageLabel: 'Sprache',
        missingAddress: 'Geben Sie eine BTC-Wallet-Adresse ein, bevor Topper geöffnet wird.',
        apiNotConfigured: 'Die Topper-API-URL ist noch nicht konfiguriert. Ersetzen Sie YOUR-VERCEL-PROJECT in buy.html.',
        creatingTopper: 'Sichere Topper-Sitzung wird erstellt...',
        topperOpened: 'Topper wurde in einem neuen Tab geöffnet.',
        topperMissingToken: 'In der Topper-Antwort fehlen Tokendaten.',
        topperUnavailable: 'Topper ist derzeit nicht verfügbar.',
        moonpayLoading: 'MoonPay wird noch geladen, bitte warten.',
      },
      fr: {
        title: 'Acheter du Bitcoin',
        buyBtn: 'Acheter du Bitcoin avec MoonPay 🚀',
        topperTitle: 'Acheter du Bitcoin avec Topper',
        topperAddressLabel: 'Adresse du portefeuille BTC',
        topperAmountLabel: 'Montant en USD',
        topperBtn: 'Acheter du Bitcoin avec Topper ✨',
        footer: 'Propulsé par MoonPay et Topper',
        languageLabel: 'Langue',
        missingAddress: 'Saisissez une adresse de portefeuille BTC avant d’ouvrir Topper.',
        apiNotConfigured: 'L’URL de l’API Topper n’est pas encore configurée. Remplacez YOUR-VERCEL-PROJECT dans buy.html.',
        creatingTopper: 'Création d’une session Topper sécurisée...',
        topperOpened: 'Topper s’est ouvert dans un nouvel onglet.',
        topperMissingToken: 'La réponse Topper ne contient pas les données du jeton.',
        topperUnavailable: 'Topper est indisponible pour le moment.',
        moonpayLoading: 'MoonPay est encore en cours de chargement, veuillez patienter.',
      },
      es: {
        title: 'Comprar Bitcoin',
        buyBtn: 'Comprar Bitcoin con MoonPay 🚀',
        topperTitle: 'Comprar Bitcoin con Topper',
        topperAddressLabel: 'Dirección de billetera BTC',
        topperAmountLabel: 'Importe en USD',
        topperBtn: 'Comprar Bitcoin con Topper ✨',
        footer: 'Con tecnología de MoonPay y Topper',
        languageLabel: 'Idioma',
        missingAddress: 'Ingresa una dirección de billetera BTC antes de abrir Topper.',
        apiNotConfigured: 'La URL de la API de Topper aún no está configurada. Reemplaza YOUR-VERCEL-PROJECT en buy.html.',
        creatingTopper: 'Creando sesión segura de Topper...',
        topperOpened: 'Topper se abrió en una nueva pestaña.',
        topperMissingToken: 'La respuesta de Topper no incluyó los datos del token.',
        topperUnavailable: 'Topper no está disponible en este momento.',
        moonpayLoading: 'MoonPay aún se está cargando, espera un momento.',
      },
      zh: {
        title: '购买比特币',
        buyBtn: '使用 MoonPay 购买比特币 🚀',
        topperTitle: '使用 Topper 购买比特币',
        topperAddressLabel: 'BTC 钱包地址',
        topperAmountLabel: 'USD 金额',
        topperBtn: '使用 Topper 购买比特币 ✨',
        footer: '由 MoonPay 和 Topper 提供支持',
        languageLabel: '语言',
        missingAddress: '请先输入 BTC 钱包地址，然后再打开 Topper。',
        apiNotConfigured: 'Topper API URL 尚未配置。请在 buy.html 中替换 YOUR-VERCEL-PROJECT。',
        creatingTopper: '正在创建安全的 Topper 会话...',
        topperOpened: 'Topper 已在新标签页中打开。',
        topperMissingToken: 'Topper 响应缺少令牌数据。',
        topperUnavailable: 'Topper 目前不可用。',
        moonpayLoading: 'MoonPay 仍在加载，请稍候。',
      },
    };

    function setLang(lang) {
      localStorage.setItem('lang', lang);
      currentLang = lang;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
      document.getElementById('language-select').value = lang;
      document.getElementById('language-select').setAttribute('aria-label', texts[lang].languageLabel);
      document.getElementById('language-select').title = texts[lang].languageLabel;
      document.getElementById('title').textContent = texts[lang].title;
      document.getElementById('buy-btn').textContent = texts[lang].buyBtn;
      document.getElementById('topper-title').textContent = texts[lang].topperTitle;
      document.getElementById('topper-address-label').textContent = texts[lang].topperAddressLabel;
      document.getElementById('topper-amount-label').textContent = texts[lang].topperAmountLabel;
      document.getElementById('topper-btn').textContent = texts[lang].topperBtn;
      document.getElementById('footer-text').textContent = texts[lang].footer;
    }

    window.setLang = setLang;
    document.getElementById('language-select').addEventListener('change', (event) => {
      setLang(event.target.value);
    });

    const savedLang = localStorage.getItem('lang');
    const browserLang = navigator.language.slice(0, 2).toLowerCase();
    const supportedLangs = Object.keys(texts);

    if (savedLang && supportedLangs.includes(savedLang)) {
      setLang(savedLang);
    } else if (supportedLangs.includes(browserLang)) {
      setLang(browserLang);
    } else {
      setLang('en');
    }

    function setTopperMessage(message, isError = false) {
      const messageEl = document.getElementById('topper-message');
      messageEl.textContent = message;
      messageEl.classList.toggle('error', isError);
    }

    function getTopperRequestPayload() {
      const address = document.getElementById('topper-address').value.trim();
      const amount = document.getElementById('topper-amount').value.trim() || '50.00';

      return {
        address,
        amount,
        fiat: 'USD',
        asset: 'BTC',
        network: 'bitcoin',
      };
    }

    document.getElementById('topper-btn').addEventListener('click', async () => {
      const topperBtn = document.getElementById('topper-btn');
      const payload = getTopperRequestPayload();

      if (!payload.address) {
        setTopperMessage(texts[currentLang].missingAddress, true);
        return;
      }

      if (TOPPER_API_URL.includes('YOUR-VERCEL-PROJECT')) {
        setTopperMessage(texts[currentLang].apiNotConfigured, true);
        return;
      }

      topperBtn.disabled = true;
      topperBtn.textContent = texts[currentLang].creatingTopper;
      setTopperMessage(texts[currentLang].creatingTopper);

      try {
        const response = await fetch(TOPPER_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.error || 'Could not create a Topper session.');
        }

        if (!data.bt || !data.appUrl) {
          throw new Error(texts[currentLang].topperMissingToken);
        }

        window.open(`${data.appUrl}?bt=${encodeURIComponent(data.bt)}`, '_blank', 'noopener,noreferrer');
        setTopperMessage(texts[currentLang].topperOpened);
      } catch (error) {
        const message = error instanceof Error ? error.message : texts[currentLang].topperUnavailable;
        setTopperMessage(message, true);
      } finally {
        topperBtn.disabled = false;
        topperBtn.textContent = texts[currentLang].topperBtn;
      }
    });

    import('https://cdn.skypack.dev/@moonpay/moonpay-js').then(({ loadMoonPay }) => {
      let moonPaySdk;

      loadMoonPay().then((moonPay) => {
        moonPaySdk = moonPay({
          flow: 'buy',
          environment: 'sandbox', // Switch to 'production' when live
          variant: 'overlay',
          params: {
            apiKey: 'pk_test_ijI3RIhL31EASrNb8FZK0X5pB8VYigP',
            theme: 'dark',
            baseCurrencyCode: 'usd',
            baseCurrencyAmount: '100',
            defaultCurrencyCode: 'btc',
          },
        });
      });

      document.getElementById('buy-btn').addEventListener('click', () => {
        if (moonPaySdk) {
          moonPaySdk.show();
        } else {
          alert(texts[currentLang].moonpayLoading);
        }
      });
    });
  </script>
</body>
</html>
